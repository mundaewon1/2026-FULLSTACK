<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MOIT</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --c1:#B6FFFA;
    --c2:#98E4FF;
    --c3:#80B3FF;
    --c4:#687EFF;

    --white:#fff;
    --text:#222;
    --gray:#666;
    --bg:#f7faff;

    --shadow:0 5px 20px rgba(0,0,0,.07);
    --radius:20px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard', sans-serif;
}

body{
    background:var(--bg);
}

a{
    text-decoration:none;
    color:inherit;
}

.container{
    width:1200px;
    max-width:95%;
    margin:auto;
}

/* ==================
HEADER
================== */

header{
    background:white;
    height:80px;
    box-shadow:var(--shadow);
}

.header-inner{
    height:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:32px;
    font-weight:700;
    color:var(--c4);
}

nav{
    display:flex;
    gap:35px;
}

nav a{
    font-weight:600;
}

.header-right{
    display:flex;
    gap:10px;
    align-items:center;
}

.search{
    width:250px;
    padding:12px;
    border-radius:50px;
    border:1px solid #ddd;
}

/* ==================
HERO
================== */

.hero{
    margin-top:30px;
    background:linear-gradient(
    135deg,
    var(--c1),
    var(--c2)
    );

    border-radius:30px;

    padding:60px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    overflow:hidden;
}

.hero h1{
    font-size:52px;
    line-height:1.3;
    margin-bottom:20px;
}

.hero p{
    color:var(--gray);
    margin-bottom:25px;
}

.hero-btn{
    display:flex;
    gap:15px;
}

.btn{
    border:none;
    padding:14px 28px;
    border-radius:50px;
    cursor:pointer;
}

.btn-primary{
    background:var(--c4);
    color:white;
}

.btn-light{
    background:white;
}

.hero-image{
    font-size:180px;
}

/* ==================
CATEGORY
================== */

.category{
    margin-top:25px;

    display:grid;
    grid-template-columns:repeat(8,1fr);
    gap:15px;
}

.category-card{
    background:white;
    padding:20px;
    border-radius:20px;
    text-align:center;
    box-shadow:var(--shadow);
}

.category-card span{
    display:block;
    margin-top:10px;
}

/* ==================
AD
================== */

.ad-banner{
    margin-top:25px;
    background:white;

    border:2px dashed var(--c3);

    border-radius:20px;

    padding:25px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    box-shadow:var(--shadow);
}

.ad-left h3{
    margin-bottom:10px;
}

.ad-btn{
    background:var(--c4);
    color:white;
    padding:10px 20px;
    border-radius:50px;
}

/* ==================
SECTION
================== */

.section{
    margin-top:40px;
}

.section-title{
    margin-bottom:20px;
    font-size:24px;
}

/* ==================
CARD
================== */

.card-wrap{
    display:grid;
    grid-template-columns:
    repeat(4,1fr);

    gap:20px;
}

.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:var(--shadow);
}

.card-img{
    height:180px;
    background:
    linear-gradient(
    135deg,
    var(--c2),
    var(--c3)
    );
}

.card-body{
    padding:20px;
}

.card-body h4{
    margin-bottom:10px;
}

.card-info{
    color:var(--gray);
    font-size:14px;
}

/* ==================
RECOMMEND
================== */

.recommend{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.recommend-box{
    padding:30px;
    border-radius:20px;
    box-shadow:var(--shadow);
}

.recommend-box:nth-child(1){
    background:#eafcff;
}

.recommend-box:nth-child(2){
    background:#fffceb;
}

.recommend-box:nth-child(3){
    background:#f0fff5;
}

/* ==================
BOTTOM
================== */

.bottom-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.notice,
.review{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:var(--shadow);
}

.notice li,
.review li{
    list-style:none;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

/* ==================
FOOTER
================== */

footer{
    margin-top:50px;
    background:white;
    padding:30px;
    text-align:center;
}

/* ==================
RESPONSIVE
================== */

@media(max-width:768px){

.hero{
    flex-direction:column;
    text-align:center;
}

.hero h1{
    font-size:32px;
}

.hero-image{
    font-size:100px;
}

.category{
    grid-template-columns:repeat(2,1fr);
}

.card-wrap{
    grid-template-columns:1fr;
}

.recommend{
    grid-template-columns:1fr;
}

.bottom-grid{
    grid-template-columns:1fr;
}

nav{
    display:none;
}

.search{
    display:none;
}

}

</style>

</head>
<body>

<header>
    <div class="container header-inner">

        <div class="logo">MOIT</div>

        <nav>
            <a href="#">홈</a>
            <a href="#">모임찾기</a>
            <a href="#">행사</a>
            <a href="#">커뮤니티</a>
            <a href="#">공지사항</a>
        </nav>

        <div class="header-right">
            <input class="search" placeholder="모임을 검색하세요">
            🔔 👤
        </div>

    </div>
</header>

<div class="container">

    <section class="hero">

        <div>

            <h1>
                당신의 관심사가<br>
                새로운 모임이 되는 곳
            </h1>

            <p>
                대학생 · 일반인을 위한 모임 플랫폼
            </p>

            <div class="hero-btn">
                <button class="btn btn-primary">모임 찾기</button>
                <button class="btn btn-light">행사 보기</button>
            </div>

        </div>

        <div class="hero-image">
            👥
        </div>

    </section>

    <section class="category">

        <div class="category-card">🏃<span>운동</span></div>
        <div class="category-card">🎨<span>문화</span></div>
        <div class="category-card">📚<span>스터디</span></div>
        <div class="category-card">🤝<span>봉사</span></div>
        <div class="category-card">🎮<span>게임</span></div>
        <div class="category-card">✈️<span>여행</span></div>
        <div class="category-card">☕<span>카페</span></div>
        <div class="category-card">🎵<span>음악</span></div>

    </section>

    <section class="ad-banner">

        <div class="ad-left">
            <h3>🎉 신규 제휴카페 오픈 이벤트</h3>
            <p>모든 음료 20% 할인</p>
        </div>

        <a href="#" class="ad-btn">자세히 보기</a>

    </section>

    <section class="section">

        <h2 class="section-title">🔥 인기 모임</h2>

        <div class="card-wrap">

            <div class="card">
                <div class="card-img"></div>
                <div class="card-body">
                    <h4>러닝 크루 모집</h4>
                    <div class="card-info">정원 8/10 · 서울</div>
                </div>
            </div>

            <div class="card">
                <div class="card-img"></div>
                <div class="card-body">
                    <h4>독서 스터디</h4>
                    <div class="card-info">정원 6/8 · 인천</div>
                </div>
            </div>

            <div class="card">
                <div class="card-img"></div>
                <div class="card-body">
                    <h4>보드게임 모임</h4>
                    <div class="card-info">정원 7/10 · 경기</div>
                </div>
            </div>

            <div class="card">
                <div class="card-img"></div>
                <div class="card-body">
                    <h4>영화 같이 볼 사람</h4>
                    <div class="card-info">정원 5/10 · 서울</div>
                </div>
            </div>

        </div>

    </section>

</div>

<footer>
    © 2026 MOIT
</footer>

</body>
</html>
