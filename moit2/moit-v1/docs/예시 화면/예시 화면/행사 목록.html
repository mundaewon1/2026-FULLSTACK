<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>MOIT | 행사 목록</title>

<style>

:root{
--c1:#B6FFFA;
--c2:#98E4FF;
--c3:#80B3FF;
--c4:#687EFF;

--bg:#f7faff;
--shadow:0 5px 20px rgba(0,0,0,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:var(--bg);
}

.container{
width:1400px;
max-width:95%;
margin:auto;
}

/* HEADER */

header{
height:80px;
background:white;
box-shadow:var(--shadow);
}

.header-inner{
height:100%;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:30px;
font-weight:bold;
color:var(--c4);
}

/* HERO */

.hero{
margin-top:30px;
height:320px;

border-radius:30px;

background:
linear-gradient(
135deg,
var(--c3),
var(--c4)
);

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

color:white;
}

.hero h1{
font-size:48px;
margin-bottom:15px;
}

.hero p{
font-size:20px;
}

/* SEARCH */

.search-box{
background:white;
margin-top:25px;
padding:25px;
border-radius:20px;
box-shadow:var(--shadow);

display:flex;
gap:10px;
}

.search-box input{
flex:1;
padding:15px;
border-radius:10px;
border:1px solid #ddd;
}

.search-box button{
padding:15px 25px;
border:none;
background:var(--c4);
color:white;
border-radius:10px;
}

/* CATEGORY */

.category{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.category button{
border:none;
padding:12px 20px;
border-radius:50px;
background:white;
cursor:pointer;
}

.category .active{
background:var(--c4);
color:white;
}

/* SECTION */

.section{
margin-top:40px;
}

.section h2{
margin-bottom:20px;
}

/* CARD */

.card-grid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(350px,1fr));

gap:20px;
}

.event-card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:var(--shadow);
transition:.3s;
}

.event-card:hover{
transform:translateY(-5px);
}

.event-img{
height:220px;

background:
linear-gradient(
135deg,
var(--c1),
var(--c3)
);
}

.event-body{
padding:20px;
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:30px;
margin-bottom:10px;
font-size:13px;
}

.open{
background:#e5fff0;
color:#009944;
}

.pending{
background:#fff8d9;
color:#b88600;
}

.event-title{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
}

.event-info{
color:#666;
margin-bottom:8px;
}

/* PAGINATION */

.pagination{
margin:40px 0;

display:flex;
justify-content:center;
gap:10px;
}

.pagination a{
width:40px;
height:40px;

display:flex;
justify-content:center;
align-items:center;

background:white;
border-radius:10px;

text-decoration:none;
color:#333;
}

.pagination .active{
background:var(--c4);
color:white;
}

/* MOBILE */

@media(max-width:768px){

.hero h1{
font-size:32px;
}

.card-grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

</div>
