<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{user/layouts/layout}">
<head lang="ko">
<meta charset="UTF-8">
</head>
<body>
	<div layout:fragment="content">
		<section class="main-hero">

			<div>

				<h1>
					당신의 관심사가<br> 새로운 모임이 되는 곳
				</h1>

				<p>대학생 · 일반인을 위한 모임 플랫폼</p>

				<div class="main-hero-btn">
					<button class="main-btn main-btn-primary">모임 찾기</button>
					<button class="main-btn main-btn-light">행사 보기</button>
				</div>

			</div>

			<div class="main-hero-image">👥</div>

		</section>

		<section class="main-category">

			<div class="main-category-card">
				🏃<span>운동</span>
			</div>
			<div class="main-category-card">
				🎨<span>문화</span>
			</div>
			<div class="main-category-card">
				📚<span>스터디</span>
			</div>
			<div class="main-category-card">
				🤝<span>봉사</span>
			</div>
			<div class="main-category-card">
				🎮<span>게임</span>
			</div>
			<div class="main-category-card">
				✈️<span>여행</span>
			</div>
			<div class="main-category-card">
				☕<span>카페</span>
			</div>
			<div class="main-category-card">
				🎵<span>음악</span>
			</div>

		</section>

		<section class="ad-banner">

			<div class="ad-left">
				<h3>🎉 신규 제휴카페 오픈 이벤트</h3>
				<p>모든 음료 20% 할인</p>
			</div>

			<a href="#" class="ad-btn">자세히 보기</a>

		</section>

		<section class="section">

			<h2 class="section-title">🔥 인기 모임</h2>

			<div class="main-card-wrap">

				<div class="card">
					<div class="card-img"></div>
					<div class="card-body">
						<h4>러닝 크루 모집</h4>
						<div class="card-info">정원 8/10 · 서울</div>
					</div>
				</div>

				<div class="card">
					<div class="card-img"></div>
					<div class="card-body">
						<h4>독서 스터디</h4>
						<div class="card-info">정원 6/8 · 인천</div>
					</div>
				</div>

				<div class="card">
					<div class="card-img"></div>
					<div class="card-body">
						<h4>보드게임 모임</h4>
						<div class="card-info">정원 7/10 · 경기</div>
					</div>
				</div>

				<div class="card">
					<div class="card-img"></div>
					<div class="card-body">
						<h4>영화 같이 볼 사람</h4>
						<div class="card-info">정원 5/10 · 서울</div>
					</div>
				</div>

			</div>
		</section>
	</div>
</body>
</html>
