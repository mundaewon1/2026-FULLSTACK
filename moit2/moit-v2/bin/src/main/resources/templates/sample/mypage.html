<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
   layout:decorate="~{user/mypage/layouts/mypageLayout}">
<!--    #1. layout 렌더링    -->
<head lang="ko">
<meta charset="UTF-8">
</head>
<body>
	<div layout:fragment="content">
		<!-- MAIN -->
		<div class="mypage-main-content">

			<div class="mypage-dashboard">

				<div class="mypage-stat-card">
					📝
					<h3>12</h3>
					<p>내 모집글</p>
				</div>

				<div class="mypage-stat-card">
					👥
					<h3>8</h3>
					<p>신청 모임</p>
				</div>

				<div class="mypage-stat-card">
					⭐
					<h3>16</h3>
					<p>작성 후기</p>
				</div>

				<div class="mypage-stat-card">
					❤️
					<h3>6</h3>
					<p>관심 모임</p>
				</div>

			</div>

			<div class="mypage-user-info">

				<h2>사용자 정보</h2>

				<div class="mypage-info-grid">

					<div class="mypage-info-box">
						<div class="mypage-info-title">닉네임</div>
						<div>홍길동</div>
					</div>

					<div class="mypage-info-box">
						<div class="mypage-info-title">이메일</div>
						<div>hong@example.com</div>
					</div>

					<div class="mypage-info-box">
						<div class="mypage-info-title">가입일</div>
						<div>2026-01-10</div>
					</div>

					<div class="mypage-info-box">
						<div class="mypage-info-title">관심 카테고리</div>
						<div>러닝, 독서, 개발</div>
					</div>

				</div>

			</div>

		</div>

		<div class="mypage-table-section">

			<h2>신청한 모임</h2>

			<table class="mypage-table">
				<thead>
					<tr>
						<th>모임명</th>
						<th>모임일</th>
						<th>상태</th>
						<th>후기</th>
					</tr>
				</thead>
				<tbody>
					<tr>
						<td class="mypage-table-title">코딩 스터디</td>
						<td>2026.06.10</td>
						<td><span class="mypage-status status-end">종료</span></td>
						<td><button class="mypage-btn mypage-btn-review">후기
								작성</button></td>
					</tr>
					<tr>
						<td class="mypage-table-title">운동 모임</td>
						<td>2026.05.15</td>
						<td><span class="mypage-status status-end">종료</span></td>
						<td><button class="mypage-btn mypage-btn-complete" disabled>작성완료</button></td>
					</tr>
					<tr>
						<td class="mypage-table-title">독서 모임</td>
						<td>2026.07.20</td>
						<td><span class="mypage-status status-progress">진행중</span></td>
						<td>-</td>
					</tr>
				</tbody>
			</table>

		</div>
	</div>
</body>
</html>
