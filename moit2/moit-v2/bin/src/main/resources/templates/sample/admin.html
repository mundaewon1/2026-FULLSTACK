<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
   layout:decorate="~{admin/layouts/adminLayout}">
<!--    #1. layout 렌더링    -->
<head lang="ko">
<meta charset="UTF-8">
</head>
<body>
	<div layout:fragment="content">
		<!-- 각자파트 -->
		<div class="row mb-4">

			<div class="col-md-3">
				<div class="card-box">
					<h6>전체 관리자</h6>
					<div class="stat-number">12</div>
				</div>
			</div>

			<div class="col-md-3">
				<div class="card-box">
					<h6>A 관리자</h6>
					<div class="stat-number">7</div>
				</div>
			</div>

			<div class="col-md-3">
				<div class="card-box">
					<h6>B 관리자</h6>
					<div class="stat-number">5</div>
				</div>
			</div>

			<div class="col-md-3">
				<div class="card-box">
					<h6>활성 관리자</h6>
					<div class="stat-number">11</div>
				</div>
			</div>

		</div>

		<div class="mb-4">
			<button class="tab-btn active">관리자목록</button>
			<button class="tab-btn">관리자등록</button>
			<button class="tab-btn">권한관리</button>
		</div>

		<div class="table-box mb-4">

			<div class="row">

				<div class="col-md-4">
					<input type="text" class="form-control" placeholder="관리자 검색">
				</div>

				<div class="col-md-3">

					<select class="form-select">
						<option>전체 권한</option>
						<option>A 관리자</option>
						<option>B 관리자</option>
					</select>

				</div>

				<div class="col-md-2">
					<button class="btn btn-primary">검색</button>
				</div>

			</div>

		</div>

		<div class="mb-3">

			<button class="btn btn-primary">등록</button>

			<button class="btn btn-warning">수정</button>

			<button class="btn btn-danger">삭제</button>

		</div>

		<div class="table-box">

			<table class="table table-hover">

				<thead class="table-light">

					<tr>
					    <th width="50">
				            <input class="form-check-input" type="checkbox" id="checkAll">
				        </th>
						<th>번호</th>
						<th>아이디</th>
						<th>이름</th>
						<th>권한등급</th>
						<th>접근권한</th>
						<th>등록일</th>
						<th width="180">관리</th>
					</tr>

				</thead>

				<tbody>
				
				    <tr>
				        <td>
				            <input class="form-check-input row-check" type="checkbox">
				        </td>
				        <td>1</td>
				        <td>admin01</td>
				        <td>김관리</td>
				        <td><span class="badge badge-role-b">B 관리자</span></td>
				        <td>전체 메뉴</td>
				        <td>2026-06-01</td>
				        <td>
							<button class="btn btn-sm btn-outline-primary me-1"
							        data-bs-toggle="modal"
							        data-bs-target="#adminModal">
							    권한
							</button>			        
				            <button class="btn btn-sm btn-outline-secondary">비밀번호</button>
				        </td>
				    </tr>
				
				    <tr>
				        <td>
				            <input class="form-check-input row-check" type="checkbox">
				        </td>
				        <td>2</td>
				        <td>admin02</td>
				        <td>박운영</td>
				        <td><span class="badge badge-role-a">A 관리자</span></td>
				        <td>지역관리, 공지사항</td>
				        <td>2026-06-03</td>
				        <td>
							<button class="btn btn-sm btn-outline-primary me-1">권한</button>
				            <button class="btn btn-sm btn-outline-secondary">비밀번호</button>
				        </td>
				    </tr>
				
				    <tr>
				        <td>
				            <input class="form-check-input row-check" type="checkbox">
				        </td>
				        <td>3</td>
				        <td>admin03</td>
				        <td>이담당</td>
				        <td><span class="badge badge-role-a">A 관리자</span></td>
				        <td>지역관리, 공지사항</td>
				        <td>2026-06-05</td>
				        <td>
				            <button class="btn btn-sm btn-outline-primary me-1">권한</button>
				            <button class="btn btn-sm btn-outline-secondary">비밀번호</button>
				        </td>
				    </tr>
				
				</tbody>

			</table>

			<nav>

				<ul class="pagination justify-content-center">

					<li class="page-item"><a class="page-link" href="#">1</a></li>

					<li class="page-item"><a class="page-link" href="#">2</a></li>

					<li class="page-item"><a class="page-link" href="#">3</a></li>

				</ul>

			</nav>

		</div>
		<!-- 관리자 정보 모달 -->
		<div class="modal fade" id="adminModal">
		
		    <div class="modal-dialog modal-lg">
		
		        <div class="modal-content">
		
		            <div class="modal-header">
		                <h5 class="modal-title">관리자 정보</h5>
		                <button class="btn-close" data-bs-dismiss="modal"></button>
		            </div>
		
		            <div class="modal-body">
		
		                <div class="row">
		
		                    <div class="col-md-6 mb-3">
		                        <label class="form-label fw-bold">아이디</label>
		                        <input type="text" class="form-control" value="admin01" readonly>
		                    </div>
		
		                    <div class="col-md-6 mb-3">
		                        <label class="form-label fw-bold">이름</label>
		                        <input type="text" class="form-control" value="김관리">
		                    </div>
		
		                    <div class="col-md-6 mb-3">
		                        <label class="form-label fw-bold">권한등급</label>
		                        <select class="form-select">
		                            <option>B 관리자</option>
		                            <option>A 관리자</option>
		                        </select>
		                    </div>
		
		                    <div class="col-md-6 mb-3">
		                        <label class="form-label fw-bold">상태</label>
		                        <select class="form-select">
		                            <option>활성</option>
		                            <option>비활성</option>
		                        </select>
		                    </div>
		
		                </div>
		
		                <hr>
		
		                <label class="form-label fw-bold mb-2">접근 권한</label>
		
		                <div class="row">
		
		                    <div class="col-md-4">
		                        <div class="form-check">
		                            <input class="form-check-input" type="checkbox" checked>
		                            <label class="form-check-label">회원관리</label>
		                        </div>
		                    </div>
		
		                    <div class="col-md-4">
		                        <div class="form-check">
		                            <input class="form-check-input" type="checkbox" checked>
		                            <label class="form-check-label">모임관리</label>
		                        </div>
		                    </div>
		
		                    <div class="col-md-4">
		                        <div class="form-check">
		                            <input class="form-check-input" type="checkbox">
		                            <label class="form-check-label">공지사항</label>
		                        </div>
		                    </div>
		
		                    <div class="col-md-4 mt-2">
		                        <div class="form-check">
		                            <input class="form-check-input" type="checkbox">
		                            <label class="form-check-label">광고관리</label>
		                        </div>
		                    </div>
		
		                    <div class="col-md-4 mt-2">
		                        <div class="form-check">
		                            <input class="form-check-input" type="checkbox">
		                            <label class="form-check-label">신고관리</label>
		                        </div>
		                    </div>
		
		                    <div class="col-md-4 mt-2">
		                        <div class="form-check">
		                            <input class="form-check-input" type="checkbox">
		                            <label class="form-check-label">행사관리</label>
		                        </div>
		                    </div>
		
		                </div>
		
		            </div>
		
		            <div class="modal-footer">
		                <button class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
		                <button class="btn btn-primary">저장</button>
		            </div>
		
		        </div>
		
		    </div>
		
		</div>
		<!-- 각자파트 -->
	</div>
</body>
</html>
