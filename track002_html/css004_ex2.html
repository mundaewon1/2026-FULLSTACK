<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어벤져스</title>
    <style>
    * {margin:0; padding:0; }

    body{  font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        background-image:linear-gradient(135deg, #f4ffb8 , #8affd0);
    }
    h1{ border-left:10px solid #123456; 
        border-bottom:1px solid #123456;
        margin:30px 0; padding-left:20px;
    }
    .container{  width:50%; margin:50px auto;   border-radius: 10px;
        background-color:#fff;  padding:20px;  box-shadow:0 0 10px rgba(0,0,0,0.2);}
    
    .t1{float:left; }
    .t2{float:right; background-color:rgb(157, 169, 245) }
    .container{overflow:hidden;} 

    ul{ width:40%; list-style:none; background-color:#e4e6cd; overflow:hidden;}

    ul.team li{float:left; margin:10px; }

    ul.team li img{width:100px; height:100px;
        border-radius:50%;
        border:3px solid #ff6600;
        transition:transform 0.8s, border-color 0.8s;}

    ul.team :first-child  img:hover{transform:translateY(-20px); border-color: #00ccff;}
    ul.team :nth-child(2) img:hover{transform:rotateZ(20deg); border-color: #33cc33;}
    ul.team li:nth-child(3) img:hover{transform:rotateX(180deg); border-color: #ff33aa;}
    ul.team li:nth-child(4) img:hover{transform:rotateY(180deg); border-color: #ffaa00;}
    ul.team li:last-child   img:hover{transform:rotate(360deg); border-color: #6600ff;}
    </style>

</head>
<body>
    <div class="container">
        <h1>어벤져스</h1>
        <ul class="team t1">
            <li><img src="./img/one.png"   alt="1번"></li>
            <li><img src="./img/two.png"   alt="2번"></li>
            <li><img src="./img/three.png" alt="3번"></li>
            <li><img src="./img/four.png"  alt="4번"></li>
            <li><img src="./img/five.png"  alt="5번"></li>
        </ul>

        <ul class="team t2">
            <li><img src="https://picsum.photos/100?random=1" alt="얼굴1"></li>
            <li><img src="https://picsum.photos/100?random=2" alt="얼굴2"></li>
            <li><img src="https://picsum.photos/100?random=3" alt="얼굴3"></li>
            <li><img src="https://picsum.photos/100?random=4" alt="얼굴4"></li>
            <li><img src="https://picsum.photos/100?random=5" alt="얼굴5"></li>
        </ul>

    </div>
    
</body>
</html>
